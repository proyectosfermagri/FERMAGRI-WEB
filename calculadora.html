<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de cultivo | Calculadora de Fertilización Fermagri</title>
    <meta name="description" content="Planifica la fertilización de tu cultivo con el Calculador de cultivo de Fermagri. Obtén cálculos exactos de sacos y nutrientes por hectárea según la etapa fenológica.">
    <meta name="keywords" content="calculadora fertilizantes, plan de fertilización, nutrición cultivos, dosis abono por hectárea, requerimientos nutricionales">
    <meta property="og:title" content="Calculadora Agronómica Calculador de cultivo | Fermagri">
    <meta property="og:description" content="Herramienta gratuita para calcular exactamente cuánto fertilizante necesitas por cada etapa de tu cultivo.">
    <meta property="og:image" content="https://fermagri.com/nosotros.jpg">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #2D5A27;
            --accent-light: #7ab929;
            --bg-light: #f4f7f4;
            --text-dark: #1e293b;
            --card-white: #ffffff;
            --border: #e2e8f0;
        }

        body.light-theme {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
        }

        .calc-hero {
            background: linear-gradient(rgba(45, 90, 39, 0.8), rgba(45, 90, 39, 0.9)), url('https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&q=80') center/cover;
            padding: 80px 20px 100px;
            text-align: center;
            color: white;
        }

        .calc-hero h1 { font-size: 3rem; margin-bottom: 10px; color: #fff; font-weight: 800; }
        .calc-hero p { font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin: 0 auto; }

        .calculator-container {
            max-width: 1100px;
            margin: -60px auto 60px;
            background: var(--card-white);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        .calc-form {
            display: grid;
            grid-template-columns: 1.2fr 1fr auto;
            gap: 25px;
            align-items: flex-end;
            margin-bottom: 50px;
            background: #f8fafc;
            padding: 30px;
            border-radius: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { color: #64748b; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
        
        select, input {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 14px 20px;
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(45, 90, 39, 0.1); }

        .btn-calc {
            background: var(--accent);
            color: white;
            padding: 15px 40px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }
        .btn-calc:hover { transform: translateY(-3px); background: #1e3d1a; box-shadow: 0 10px 20px rgba(45, 90, 39, 0.2); }

        /* Calendario Styles */
        .calendar-section { margin-top: 50px; }
        .calendar-section h2 { color: var(--text-dark); margin-bottom: 30px; font-weight: 800; text-align: center; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }
        .calendar-step {
            background: white;
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
            transition: 0.3s;
            border-bottom: 5px solid #e2e8f0;
        }
        .calendar-step:hover { transform: translateY(-5px); border-bottom-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .step-week { font-size: 0.75rem; background: var(--accent-light); color: white; padding: 6px 15px; border-radius: 100px; font-weight: 800; }
        .calendar-step h4 { margin: 15px 0 10px; color: var(--accent); font-size: 1.1rem; }
        .calendar-step p { color: #64748b; font-size: 0.95rem; line-height: 1.6; }

        /* Results */
        .results-section {
            margin-top: 50px;
            background: #f8fafc;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
        }
        .hidden { display: none; }
        .npk-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .npk-item { text-align: center; padding: 25px; background: white; border-radius: 16px; border: 1px solid var(--border); }
        .npk-item strong { display: block; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .npk-item span { color: var(--text-dark); font-size: 1.8rem; font-weight: 800; }

        .recommendation-title { font-weight: 800; color: var(--text-dark); margin-bottom: 20px; display: block; }
        .product-cards { display: grid; grid-gap: 15px; }
        .p-card { background: white; padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); border: 1px solid var(--border); border-left: 6px solid var(--accent); }
        .p-card h5 { margin: 0 0 5px; color: var(--accent); font-size: 1.1rem; font-weight: 800; }
        .p-card p { margin: 0; color: #64748b; font-size: 0.9rem; }

        /* ── Responsivo Móvil ── */
        @media (max-width: 768px) {
            .calc-hero {
                padding: 70px 20px 80px;
            }
            .calc-hero h1 { font-size: 2rem; }
            .calc-hero p { font-size: 0.95rem; }

            .calculator-container {
                margin: -40px 12px 40px;
                padding: 24px 18px;
                border-radius: 20px;
            }

            /* Formulario: apilado verticalmente */
            .calc-form {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 20px;
            }

            .btn-calc {
                width: 100%;
                justify-content: center;
                padding: 16px;
                font-size: 1rem;
            }

            /* NPK: 3 cols más compactas */
            .npk-summary {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
            }
            .npk-item { padding: 14px 8px; }
            .npk-item span { font-size: 1.3rem; }
            .npk-item strong { font-size: 0.65rem; }

            /* Calendar grid: 1 columna */
            .calendar-grid { grid-template-columns: 1fr; gap: 16px; }
            .calendar-step { padding: 20px; }

            .results-section { padding: 24px 16px; }
        }
    </style>
</head>
<body class="light-theme">
    
    <div id="header-placeholder"></div>

    <header class="calc-hero">
        <h1>FERMAGRI CALCULADOR DE CULTIVO</h1>
        <p>Optimiza tu inversión. Calcula el plan de nutrición exacto según tu cultivo y extensión de terreno.</p>
    </header>

    <main class="calculator-container">
        <div class="calc-form">
            <div class="input-group">
                <label>Selecciona tu cultivo</label>
                <select id="crop-select">
                    <option value="" disabled selected>Cargando cultivos...</option>
                </select>
            </div>
            <div class="input-group">
                <label>Cantidad (Hectáreas)</label>
                <input type="number" id="hectares" placeholder="Ej: 10" min="1">
            </div>
            <button class="btn-calc" id="btn-calculate">
                <i class="fas fa-calculator"></i> Generar Plan
            </button>
        </div>

        <div id="plan-results" class="hidden">
            <div class="calendar-section">
                <h2>Calendario Fenológico Sugerido</h2>
                <div id="calendar-grid" class="calendar-grid">
                    <!-- Dinámico -->
                </div>
            </div>

            <div class="results-section">
                <h2>Calculo de Requerimientos NPK</h2>
                <div id="results-content">
                    <!-- Dinámico -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
    <script src="calculadora.js"></script>
    <script src="chatbot.js"></script>
</body>
</html>
