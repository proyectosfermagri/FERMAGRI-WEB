<script>
       
document.addEventListener("DOMContentLoaded", () => {
    const titulo = document.getElementById('titulo-tipeado');
    
    if (titulo) {
        const textoAEscribir = titulo.getAttribute('data-texto');
        let i = 0;
        let borrando = false;

        function efectoEscritura() {
            const textoActual = titulo.innerHTML;

            if (!borrando && i <= textoAEscribir.length) {
                // Escribiendo
                titulo.innerHTML = textoAEscribir.substring(0, i);
                i++;
                
                // Si terminó de escribir, espera 2 segundos y empieza a borrar
                if (i > textoAEscribir.length) {
                    borrando = true;
                    setTimeout(efectoEscritura, 2000); 
                    return;
                }
            } else if (borrando && i >= 0) {
                // Borrando
                titulo.innerHTML = textoAEscribir.substring(0, i);
                i--;

                // Si terminó de borrar, espera un poco y vuelve a escribir
                if (i < 0) {
                    borrando = false;
                    i = 0;
                    setTimeout(efectoEscritura, 500);
                    return;
                }
            }

            // Velocidad: más lento al borrar, más rápido al escribir
            const velocidad = borrando ? 50 : 100;
            setTimeout(efectoEscritura, velocidad);
        }

        // Usamos el observador para que el bucle inicie solo cuando el usuario lo vea
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    efectoEscritura();
                    observer.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.5 });

        observer.observe(titulo);
    }
});
// ------------------------------------------

</script>
